<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DAPSEnv Intelligence Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
    
    :root {
      --bg: #07090e;
      --panel-bg: rgba(16, 22, 34, 0.65);
      --border: rgba(0, 240, 255, 0.2);
      --accent: #00f0ff;
      --red: #ff3366;
      --green: #00ff88;
      --yellow: #ffd500;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.05), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(255, 51, 102, 0.05), transparent 25%);
    }

    header {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: rgba(7, 9, 14, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    header h1 span { color: var(--accent); }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--green);
    }
    
    .dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 8px var(--green); }
      50% { box-shadow: 0 0 16px var(--green); transform: scale(1.1); }
      100% { box-shadow: 0 0 8px var(--green); }
    }

    main {
      flex: 1;
      padding: 30px 40px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 30px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 30px;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    h2 {
      font-size: 1.1rem;
      color: var(--accent);
      margin-bottom: 25px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(0, 240, 255, 0.1);
      padding-bottom: 15px;
    }

    /* Left Sidebar */
    .stat-box { margin-bottom: 25px; }
    .stat-label {
      font-size: 0.85rem;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .stat-value {
      font-size: 2.2rem;
      font-weight: 300;
      font-family: monospace;
    }

    /* Main Area */
    .observation-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .obs-card {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.3s;
    }
    
    .obs-card.high-threat { border-color: rgba(255,51,102,0.5); box-shadow: inset 0 0 20px rgba(255,51,102,0.1); }
    .obs-card.safe { border-color: rgba(0,255,136,0.5); box-shadow: inset 0 0 20px rgba(0,255,136,0.1); }

    .obs-val {
      font-size: 1.5rem;
      margin-top: 10px;
      font-family: monospace;
      color: var(--text);
    }

    /* Actions */
    .controls { display: flex; flex-direction: column; gap: 20px; }
    
    .confidence-slider {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(0,0,0,0.3);
      padding: 15px 20px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .confidence-slider input[type=range] { flex: 1; accent-color: var(--accent); }
    
    .action-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    button {
      padding: 16px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .btn-clear { background: rgba(0, 255, 136, 0.1); color: var(--green); border: 1px solid var(--green); }
    .btn-clear:hover { background: var(--green); color: #000; box-shadow: 0 0 20px rgba(0,255,136,0.4); }

    .btn-soft { background: rgba(255, 213, 0, 0.1); color: var(--yellow); border: 1px solid var(--yellow); }
    .btn-soft:hover { background: var(--yellow); color: #000; box-shadow: 0 0 20px rgba(255,213,0,0.4); }

    .btn-hard { background: rgba(255, 51, 102, 0.1); color: var(--red); border: 1px solid var(--red); }
    .btn-hard:hover { background: var(--red); color: #000; box-shadow: 0 0 20px rgba(255,51,102,0.4); }

    .btn-gemini { background: rgba(0, 240, 255, 0.1); color: var(--accent); border: 1px solid var(--accent); }
    .btn-gemini:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px rgba(0,240,255,0.4); }

    .btn-init { background: var(--accent); color: #000; grid-column: span 4; margin-top: 15px;}
    .btn-init:hover { box-shadow: 0 0 25px rgba(0,240,255,0.5); transform: translateY(-2px); }

    pre#log {
      margin-top: 30px;
      background: rgba(0,0,0,0.5);
      padding: 20px;
      border-radius: 8px;
      font-family: monospace;
      color: var(--text-dim);
      height: 250px;
      overflow-y: auto;
      border: 1px solid rgba(255,255,255,0.1);
      line-height: 1.5;
    }
    
    .log-reward { color: var(--green); }
    .log-warn { color: var(--yellow); }
    .log-err { color: var(--red); }
  </style>
</head>
<body>

  <header>
    <h1>DAPS<span>ENV</span></h1>
    <div class="status-indicator"><div class="dot"></div> Backend Online</div>
  </header>

  <main>
    <aside class="panel">
      <h2>Episode State</h2>
      <div class="stat-box">
        <div class="stat-label">Total Reward</div>
        <div class="stat-value" id="currentReward" style="color: var(--green)">0.00</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Current Task</div>
        <div class="stat-value" id="tasksDone" style="font-size: 1.8rem">--</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Difficulty Profile</div>
        <div class="stat-value" id="currentDiff" style="font-size: 1.4rem; color: var(--accent)">Not Started</div>
      </div>
    </aside>

    <div class="panel">
      <h2>Observation Data</h2>
      
      <div class="observation-grid" id="obsGrid">
        <div class="obs-card"><div class="stat-label">System Status</div><div class="obs-val">Awaiting Initialization</div></div>
      </div>

      <h2>Action Terminal</h2>
      <div class="controls">
        <div class="confidence-slider">
          <div class="stat-label" style="margin:0">Confidence </div>
          <input type="range" id="confSlider" min="0.1" max="1.0" step="0.1" value="0.9" oninput="document.getElementById('confVal').innerText = parseFloat(this.value).toFixed(1)">
          <div id="confVal" class="obs-val" style="margin:0; font-size:1.2rem; color: var(--accent)">0.9</div>
        </div>
        
        <div class="action-buttons">
          <button class="btn-clear" onclick="stepEnv('CLEAR')">CLEAR / ALLOW</button>
          <button class="btn-soft" onclick="stepEnv('FLAG_SOFT')">FLAG SOFT (REVIEW)</button>
          <button class="btn-hard" onclick="stepEnv('FLAG_HARD')">FLAG HARD (BLOCK)</button>
          <button class="btn-gemini" onclick="stepEnv('REQUEST_GEMINI')">INVOKE GEMINI</button>
          <button class="btn-init" onclick="resetEnv()">INITIALIZE NEW EPISODE</button>
        </div>
      </div>

      <pre id="log">System initialized. Awaiting commands...</pre>
    </div>
  </main>

  <script>
    function log(msg, type='') {
      const el = document.getElementById('log');
      let styledMsg = msg;
      if(type === 'reward') styledMsg = `<span class="log-reward">${msg}</span>`;
      if(type === 'warn') styledMsg = `<span class="log-warn">${msg}</span>`;
      if(type === 'err') styledMsg = `<span class="log-err">${msg}</span>`;
      
      el.innerHTML = `[${new Date().toLocaleTimeString()}] ${styledMsg}\n` + el.innerHTML;
    }

    function renderObs(obs) {
      if(!obs) return;
      const formatNum = (n) => typeof n === 'number' ? n.toFixed(3) : n;
      
      let html = '';
      
      html += `<div class="obs-card ${obs.sscd_score > 0.85 ? 'high-threat' : 'safe'}">
                 <div class="stat-label">SSCD Similarity</div>
                 <div class="obs-val ${obs.sscd_score > 0.85 ? 'log-err' : 'log-reward'}">${formatNum(obs.sscd_score)}</div>
               </div>`;
               
      html += `<div class="obs-card ${obs.phash_distance < 10 ? 'high-threat' : 'safe'}">
                 <div class="stat-label">pHash Distance</div>
                 <div class="obs-val ${obs.phash_distance < 10 ? 'log-err' : 'log-reward'}">${obs.phash_distance}</div>
               </div>`;
               
      html += `<div class="obs-card">
                 <div class="stat-label">Detected Mod Type</div>
                 <div class="obs-val" style="font-size:1.1rem; color:var(--yellow)">${obs.modification_type || 'None'}</div>
               </div>`;
               
      html += `<div class="obs-card">
                 <div class="stat-label">Active Task Identifier</div>
                 <div class="obs-val" style="font-size:1rem">${obs.task_id}</div>
               </div>`;

      if(obs.gemini_verdict) {
         html += `<div class="obs-card" style="grid-column: span 2; border-color: var(--accent);">
                    <div class="stat-label">Vision AI Verdict</div>
                    <div class="obs-val" style="font-size:1.1rem">${obs.gemini_verdict}</div>
                  </div>`;
      }
      
      document.getElementById('obsGrid').innerHTML = html;
      document.getElementById('currentDiff').innerText = obs.difficulty ? obs.difficulty.toUpperCase() : 'UNKNOWN';
    }

    async function apiPost(endpoint, bodyParams) {
      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyParams)
        });
        return await res.json();
      } catch (err) {
        log(`Network Error: ${err.message}`, 'err');
        return null;
      }
    }

    async function resetEnv() {
      log(`Initializing Environment Sequence...`);
      const data = await apiPost('/reset', {});
      if(data && data.observation) {
        log(`Observation loaded successfully.`, 'reward');
        renderObs(data.observation);
        getState();
      }
    }

    async function stepEnv(actionStr) {
      const conf = parseFloat(document.getElementById('confSlider').value);
      log(`Transmitting Action: ${actionStr} [Conf: ${conf}]`, 'warn');
      
      const payload = { action: { action_type: actionStr, confidence: conf } };
      const data = await apiPost('/step', payload);
      
      if(data) {
        if(data.reward !== undefined) {
           log(`Yielded Reward: ${data.reward.toFixed(3)}`, data.reward >= 0 ? 'reward' : 'err');
        }
        
        if(data.done) {
            log(`EPISODE COMPLETE. Finalizing metrics...`);
            if(data.info?.episode_summary) {
                const gr = data.info.episode_summary.performance_grade || 'N/A';
                log(`Final Grade: ${gr}`, 'reward');
                document.getElementById('currentReward').innerText = data.info.episode_summary.total_reward.toFixed(2);
                document.getElementById('currentDiff').innerText = `GRADE: ${gr}`;
            }
        } else {
            renderObs(data.observation);
            getState();
        }
      }
    }

    async function getState() {
      try {
        const res = await fetch('/state');
        const data = await res.json();
        if(data) {
           if(data.total_reward !== undefined) {
             document.getElementById('currentReward').innerText = data.total_reward.toFixed(2);
           }
           document.getElementById('tasksDone').innerText = `Step ${data.step_count || 0}`;
        }
      } catch (e) { }
    }
  </script>
</body>
</html>

spec_version: 1

name: daps-env
display_name: "DAPSEnv — Digital Asset Protection System"
description: >
  An OpenEnv-compliant RL environment where an AI agent acts as a copyright
  infringement investigator. The agent evaluates media assets using SSCD
  similarity signals, perceptual hash, and forensic metadata — deciding to
  Clear, Soft-Flag, Hard-Flag, or invoke Gemini Vision for deeper analysis.
  Features 9 unique task variants across 3 difficulty levels, including
  adversarial decoys and AI-generated lookalike detection.
  Confidence-weighted reward shaping teaches calibrated decision-making.

version: "2.2.1"
author: "Sovan"
license: "MIT"

type: typed  # Uses typed Pydantic Action/Observation/State models

runtime:
  language: python
  python_version: "3.11"

app:
  module: server.app
  object: app
  port: 7860

endpoints:
  reset:
    method: POST
    path: /reset
    description: "Start a new episode. Returns first asset observation."
  step:
    method: POST
    path: /step
    description: "Submit an action. Returns reward, done flag, next observation, evidence packet."
  state:
    method: GET
    path: /state
    description: "Inspect current episode state snapshot with analytics."
  health:
    method: GET
    path: /health
    description: "Liveness probe."
  tasks:
    method: GET
    path: /tasks
    description: "List all 9 task variants and their graders."
  info:
    method: GET
    path: /info
    description: "Environment description and capabilities."
  metrics:
    method: GET
    path: /metrics
    description: "Performance analytics across episodes."

tasks:
  # ── Easy tasks ──
  - id: easy_exact_copy
    name: "Exact Copy Detection"
    description: "Near-exact copy with minimal modification. SSCD > 0.92, pHash < 5. Expected action: FLAG_HARD."
    difficulty: easy
    reward_range: [0.0, 1.0]
    grader: "tasks.easy_exact_copy.grader:grade"
  - id: easy_recompressed
    name: "Recompressed Copy Detection"
    description: "Same content re-encoded with quality loss. SSCD > 0.90, pHash < 6. Expected action: FLAG_HARD."
    difficulty: easy
    reward_range: [0.0, 1.0]
    grader: "tasks.easy_recompressed.grader:grade"
  - id: easy_cropped
    name: "Cropped Copy Detection"
    description: "Cropped version of original. SSCD > 0.88, pHash < 8. Expected action: FLAG_HARD."
    difficulty: easy
    reward_range: [0.0, 1.0]
    grader: "tasks.easy_cropped.grader:grade"
  # ── Medium tasks ──
  - id: medium_filtered
    name: "Filtered Asset Detection"
    description: "Color/style filter applied. SSCD 0.65-0.85, pHash 8-20. Expected action: FLAG_SOFT."
    difficulty: medium
    reward_range: [0.0, 1.0]
    grader: "tasks.medium_filtered.grader:grade"
  - id: medium_watermarked
    name: "Watermark Detection"
    description: "Watermark added or removed. Perceptual hash shifts but deep embedding recognizable. Expected action: FLAG_SOFT."
    difficulty: medium
    reward_range: [0.0, 1.0]
    grader: "tasks.medium_watermarked.grader:grade"
  - id: medium_metadata_mismatch
    name: "Metadata Anomaly Detection"
    description: "Color-graded asset with suspicious metadata. Low consistency, suspicious source. Expected action: FLAG_SOFT."
    difficulty: medium
    reward_range: [0.0, 1.0]
    grader: "tasks.medium_metadata_mismatch.grader:grade"
  # ── Hard tasks ──
  - id: hard_ambiguous
    name: "Ambiguous Asset Classification"
    description: "Conflicting signals. Could be CLEAR or FLAG_HARD. Optimal: call REQUEST_GEMINI first, then decide."
    difficulty: hard
    reward_range: [0.0, 1.0]
    grader: "tasks.hard_ambiguous.grader:grade"
  - id: hard_adversarial_decoy
    name: "Adversarial Decoy (Agent-Under-Attack)"
    description: "Signals LOOK like infringement but asset is original. Tests false positive control. Expected action: CLEAR."
    difficulty: hard
    reward_range: [0.0, 1.0]
    grader: "tasks.hard_adversarial_decoy.grader:grade"
  - id: hard_ai_generated
    name: "AI-Generated Lookalike Detection"
    description: "AI-generated content similar to original. SSCD picks up style similarity, pHash diverges. Expected action: FLAG_SOFT."
    difficulty: hard
    reward_range: [0.0, 1.0]
    grader: "tasks.hard_ai_generated.grader:grade"

action_space:
  type: categorical
  values: [CLEAR, FLAG_SOFT, FLAG_HARD, REQUEST_GEMINI]

observation_space:
  # Core signals
  sscd_score: {type: float, range: [0.0, 1.0]}
  phash_distance: {type: int, range: [0, 256]}
  modification_type: {type: categorical, values: [NONE, CROP, FILTER, WATERMARK, COMPOSITE, RECOMPRESSION, AI_GENERATED, UNKNOWN]}
  modification_confidence: {type: float, range: [0.0, 1.0]}
  # Context
  source_domain: {type: string}
  file_size_ratio: {type: float}
  upload_delay_hours: {type: float}
  # Forensic metadata
  metadata_consistency: {type: float, range: [0.0, 1.0]}
  timestamp_anomaly: {type: bool}
  source_reputation: {type: float, range: [0.0, 1.0]}
  threat_level: {type: categorical, values: [BENIGN, LOW, MEDIUM, HIGH, CRITICAL]}
  # Gemini (optional)
  gemini_verdict: {type: string, optional: true}
  gemini_similarity: {type: float, range: [0.0, 1.0], optional: true}

reward:
  correct_decision: +1.0            # CLEAR, FLAG_SOFT, or FLAG_HARD exactly matching ground truth
  partial_flag_mismatch: +0.5       # FLAG_SOFT when FLAG_HARD expected (or vice versa)
  false_positive: +0.2              # Flagged an original asset (small partial credit for caution)
  false_negative: 0.0               # Cleared a confirmed infringement (no credit)
  request_gemini_cost: 0.0          # Gemini Vision escalation call cost (changed to 0 to strictly obey 0.0-1.0 range)
  episode_bonus_8_or_9_correct: +1.0  # Bonus when 8 or 9 tasks are correct
  episode_bonus_7_correct: +0.5     # Bonus when 7 tasks are correct
  per_step_range: [0.0, 1.0]        # Min/max reward per individual step

environment:
  max_steps_per_episode: 18
  tasks_per_episode: 9
  unique_task_variants: 9
  supports_concurrent_sessions: false
